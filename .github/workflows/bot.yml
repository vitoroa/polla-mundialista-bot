name: World Cup Bot

on:
  schedule:
    # Every 5 minutes. GitHub cron uses UTC.
    - cron: '*/5 * * * *'
  # Allow manual triggering from GitHub UI
  workflow_dispatch:

# Allow the workflow to commit state back to the repo
permissions:
  contents: write

# Prevent overlapping runs (so we don't double-post)
concurrency:
  group: wc-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          GA_INSTANCE: ${{ secrets.GA_INSTANCE }}
          GA_TOKEN: ${{ secrets.GA_TOKEN }}
          GA_GROUP: ${{ secrets.GA_GROUP }}
          GA_GROUP_LEADERBOARD: ${{ secrets.GA_GROUP_LEADERBOARD }}
          FD_TOKEN: ${{ secrets.FD_TOKEN }}
          POLLAYA_LINK: ${{ secrets.POLLAYA_LINK }}
          POLLAYA_TOKEN: ${{ secrets.POLLAYA_TOKEN }}
          POLLAYA_GROUP_ID: ${{ secrets.POLLAYA_GROUP_ID }}
        run: python wc_bot.py

      - name: Commit updated state file
        run: |
          if [[ -n "$(git status --porcelain wc_state.json)" ]]; then
            git config user.name "wc-bot"
            git config user.email "bot@users.noreply.github.com"
            git add wc_state.json
            git commit -m "Update bot state [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi
